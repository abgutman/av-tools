name: Earnings EDGAR Poll

# SAFETY NOTES (Phase 2 deploy):
#   1. Schedule trigger is COMMENTED OUT below. Workflow only runs on manual dispatch
#      until Av reviews and enables it.
#   2. Scripts run WITHOUT the `--live` flag — alerts log to action output but DO NOT email.
#      Flip `--live` on after reviewing the action logs.

on:
  workflow_dispatch:
  # WHEN READY TO GO LIVE, uncomment one or more of these schedules:
  # schedule:
  #   - cron: '*/5 11-13 * * 1-5'   # Pre-market (5-min): 7:00-9:55 AM ET (EDT), weekdays
  #   - cron: '0 20 * * 1-5'         # Post-market evening shot: 4:00 PM ET (EDT), weekdays
  #   - cron: '30 13,16,18 * * 1-5'  # Tier 3 mid-day snapshots: 9:30 AM, noon, 2 PM ET

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install curl-cffi

      - name: Run all polls
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          # NOTE: --live flag intentionally absent → alerts log only, no email.
          # To enable real emails, add `--live` to all commands below.
          python poll_edgar.py
          python poll_yahoo_news.py || echo "(yahoo poll optional)"
          python poll_wires.py || echo "(wires poll optional)"

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add earnings_data/last_seen.json earnings_data/yahoo_last_seen.json earnings_data/wire_last_seen.json 2>/dev/null || true
          git add earnings_data/confirmed_dates.json earnings_data/*log.txt 2>/dev/null || true
          git diff --cached --quiet && echo "No state changes" && exit 0
          git commit -m "Earnings poll state update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
