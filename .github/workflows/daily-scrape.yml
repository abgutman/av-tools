name: Daily Court Scrape

on:
  schedule:
    - cron: '0 9 * * *'  # 9:00 UTC = 5:00 AM ET (EDT), every day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Lower Merion cases (Montco)
        run: python fetch_montco_lm.py --daily

      - name: Fetch Media cases (Delco)
        run: python fetch_delco_media.py --daily

      - name: Send weekly digest (Monday only)
        if: github.event.schedule == '0 9 * * *' && contains('Mon', steps.date.outputs.day) || github.event_name == 'workflow_dispatch'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: |
          DAY=$(date -u +%a)
          if [ "$DAY" = "Mon" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python send_local_digest.py
          else
            echo "Not Monday, skipping digest"
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
