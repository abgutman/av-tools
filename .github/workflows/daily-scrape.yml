name: Daily Court Scrape

on:
  schedule:
    - cron: '30 9 * * 1-5'  # 9:30 UTC = 5:30 AM ET (EDT), Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright PyPDF2
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch court calendar
        run: python fetch_philly_calendar.py

      - name: Fetch new felony filings
        run: python fetch_philly_felonies.py

      - name: Fetch plea calendar
        run: python fetch_philly_pleas.py

      - name: Run plea watch (daily mode)
        run: python fetch_plea_watch.py --daily

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
